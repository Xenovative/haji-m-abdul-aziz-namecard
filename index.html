<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital name card for Dato’ Haji Mohd Abdul Aziz Bin Mohamed" />
  <meta name="theme-color" content="#0A2E1D" />
  <title>Dato’ Haji Mohd Abdul Aziz Bin Mohamed — Digital Name Card</title>
  <style>
    :root {
      --bg: #0A2E1D;
      --accent: rgba(255, 255, 255, 0.08);
      --accent-hover: rgba(255, 255, 255, 0.20);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 588px;
      background: var(--bg);
      line-height: 0;
    }
    .card picture, .card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .hotspot {
      position: absolute;
      display: block;
      z-index: 10;
      background: var(--accent);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
    }
    .hotspot:hover, .hotspot:focus {
      background: var(--accent-hover);
      outline: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Hero Save Contact button */
    .hs-save-top {
      top: 18.0%;
      left: 37.2%;
      width: 25.5%;
      height: 1.5%;
    }

    /* Contact rows */
    .hs-phone {
      top: 34.3%;
      left: 6.8%;
      width: 86.4%;
      height: 1.2%;
    }
    .hs-whatsapp {
      top: 35.5%;
      left: 6.8%;
      width: 86.4%;
      height: 1.2%;
    }
    .hs-email {
      top: 36.7%;
      left: 6.8%;
      width: 86.4%;
      height: 1.2%;
    }
    .hs-address {
      top: 38.5%;
      left: 6.8%;
      width: 86.4%;
      height: 7.0%;
    }

    /* Bottom Save Contact button */
    .hs-save-bottom {
      top: 55.8%;
      left: 35%;
      width: 30%;
      height: 1.7%;
    }

    /* Social icons row */
    .hs-social {
      top: 59.2%;
      left: 15%;
      width: 70%;
      height: 2.4%;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="Digital name card">
      <picture>
        <source srcset="namecard.webp" type="image/webp" />
        <img src="namecard.jpg" alt="Dato’ Haji Mohd Abdul Aziz Bin Mohamed digital name card" loading="eager" />
      </picture>

      <a class="hotspot hs-save-top" href="contact.vcf" download="Dato-Haji-Mohd-Abdul-Aziz-Bin-Mohamed.vcf" type="text/x-vcard">
        <span class="sr-only">Save contact</span>
      </a>

      <a class="hotspot hs-phone" href="tel:+60139765870">
        <span class="sr-only">Call +60 13-976 5870</span>
      </a>

      <a class="hotspot hs-whatsapp" href="https://wa.me/60139765870" target="_blank" rel="noopener noreferrer">
        <span class="sr-only">WhatsApp +60 13-976 5870</span>
      </a>

      <a class="hotspot hs-email" href="mailto:mdaziz@cafcapital.com.my">
        <span class="sr-only">Email mdaziz@cafcapital.com.my</span>
      </a>

      <a class="hotspot hs-address" href="https://www.google.com/maps/search/?api=1&query=Menara+Mustapha+Kamal+Damansara+Perdana" target="_blank" rel="noopener noreferrer">
        <span class="sr-only">Open address in Google Maps</span>
      </a>

      <a class="hotspot hs-save-bottom" href="contact.vcf" download="Dato-Haji-Mohd-Abdul-Aziz-Bin-Mohamed.vcf" type="text/x-vcard">
        <span class="sr-only">Save contact</span>
      </a>

      <a class="hotspot hs-social" href="#" title="Social media links — update URLs in index.html" onclick="return false;">
        <span class="sr-only">Social media links (coming soon)</span>
      </a>
    </section>
  </main>
</body>
</html>
