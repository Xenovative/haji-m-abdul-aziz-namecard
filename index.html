<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital name card for Dato’ Haji Mohd Abdul Aziz Bin Mohamed" />
  <meta name="theme-color" content="#0A2E1D" />
  <title>Dato’ Haji Mohd Abdul Aziz Bin Mohamed — Digital Name Card</title>
  <style>
    :root {
      --bg: #0A2E1D;
      --accent-hover: rgba(255, 255, 255, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 588px;
      background: var(--bg);
      line-height: 0;
    }
    .card picture, .card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .hotspot {
      position: absolute;
      display: block;
      z-index: 10;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
    }
    .hotspot:hover, .hotspot:focus {
      background: var(--accent-hover);
      outline: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hs-save-top {
      top: 18.0%;
      left: 37.2%;
      width: 25.5%;
      height: 1.5%;
    }

    .hs-phone {
      top: 89.6%;
      left: 6.8%;
      width: 86.4%;
      height: 1.1%;
    }
    .hs-whatsapp {
      top: 90.8%;
      left: 6.8%;
      width: 86.4%;
      height: 1.1%;
    }
    .hs-email {
      top: 92.0%;
      left: 6.8%;
      width: 86.4%;
      height: 1.1%;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="Digital name card">
      <picture>
        <source srcset="namecard.webp" type="image/webp" />
        <img src="namecard.jpg" alt="Dato’ Haji Mohd Abdul Aziz Bin Mohamed digital name card" loading="eager" />
      </picture>

      <a class="hotspot hs-save-top" href="contact.vcf" download="Dato-Haji-Mohd-Abdul-Aziz-Bin-Mohamed.vcf" type="text/x-vcard">
        <span class="sr-only">Save contact</span>
      </a>

      <a class="hotspot hs-phone" href="tel:+60139765870">
        <span class="sr-only">Call +60 13-976 5870</span>
      </a>

      <a class="hotspot hs-whatsapp" href="https://wa.me/60139765870" target="_blank" rel="noopener noreferrer">
        <span class="sr-only">WhatsApp +60 13-976 5870</span>
      </a>

      <a class="hotspot hs-email" href="mailto:mdaziz@cafcapital.com.my">
        <span class="sr-only">Email mdaziz@cafcapital.com.my</span>
      </a>
    </section>
  </main>
  <script>
    // #region agent log
    window.addEventListener('load', () => {
      const card = document.querySelector('.card');
      const img = document.querySelector('.card img');
      const hs = [...document.querySelectorAll('.hotspot')].map((el) => ({
        cls: el.className,
        href: el.getAttribute('href'),
        topPct: card ? ((el.getBoundingClientRect().top - card.getBoundingClientRect().top) / card.getBoundingClientRect().height * 100).toFixed(1) : null,
      }));
      fetch('http://127.0.0.1:7501/ingest/13cfea48-8ef8-4597-8481-d17014fbf4be',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'783f56'},body:JSON.stringify({sessionId:'783f56',location:'index.html:abdul-restore',message:'Restored image namecard',data:{imgLoaded:!!img?.naturalWidth,hotspots:hs,hasAddress:!!document.querySelector('.hs-address'),hasOverlay:!!document.querySelector('.focus-overlay')},timestamp:Date.now(),runId:'abdul-restore',hypothesisId:'H5'})}).catch(()=>{});
    });
    // #endregion
  </script>
</body>
</html>
